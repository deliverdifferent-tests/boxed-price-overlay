<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #60a5fa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stats {
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .stat-label { color: #999; }
    .stat-value { color: #4ade80; font-weight: 600; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(100,120,255,0.3);
      background: rgba(100,120,255,0.1);
      color: #60a5fa;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 6px;
    }
    .btn:hover {
      background: rgba(100,120,255,0.2);
    }
    .btn.danger {
      border-color: rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.1);
      color: #ef4444;
    }
    .btn.danger:hover {
      background: rgba(239,68,68,0.2);
    }
    .version {
      text-align: center;
      color: #555;
      font-size: 10px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>📊 Boxed Price Overlay</h1>
  
  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">Cached lookups</span>
      <span class="stat-value" id="cached-count">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="status">Active</span>
    </div>
  </div>

  <button class="btn" id="rescan-btn">🔄 Rescan Page</button>
  <button class="btn danger" id="clear-cache-btn">🗑 Clear Cache</button>
  
  <div class="version">v1.0.0 · PriceCharting data</div>

  <script src="popup.js"></script>
</body>
</html>
